services:
  backend:
    build: ./backend
    ports:
      - "54321:54321"
    environment:
      - PORT=54321
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:54321}
    ports:
      - "53000:80"
    depends_on:
      - backend
