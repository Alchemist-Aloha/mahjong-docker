version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "54321:54321"
    environment:
      - PORT=54321
      - NODE_ENV=development
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev

  frontend:
    build: ./frontend
    ports:
      - "53000:53000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:54321
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm start
    depends_on:
      - backend
