services:
  backend:
    build: ./backend
    ports:
      - "54321:54321"
    environment:
      - PORT=54321
      - NODE_ENV=production

  frontend:
    build: ./frontend
    ports:
      - "53000:80"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:54321}
    depends_on:
      - backend
